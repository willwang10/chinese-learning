<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>保护视力 - 看图说话</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{
            background: #f5f2eb;
        }

        /* 页面主体 */
        .topic-container{
            width: 92%;
            margin: 40px auto;
        }

        /* 卷轴区域 */
        .scroll-wrapper{
            position: relative;
            background: #f8f3ea;
            border: 2px solid #d7b7aa;
            padding: 28px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* 两侧卷轴 */
        .scroll-wrapper::before,
        .scroll-wrapper::after{
            content: "";
            position: absolute;
            top: -18px;
            width: 22px;
            height: 100%;
            background: linear-gradient(to right,#222,#555,#111);
            border-radius: 6px;
        }

        .scroll-wrapper::before{
            left: -28px;
        }

        .scroll-wrapper::after{
            right: -28px;
        }

        .topic-layout{
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* 左侧图片区 */
        .topic-left{
            width: 42%;
        }

        .topic-left img{
            width: 100%;
            border: 4px solid #eee;
            display: block;
        }

        .topic-title{
            margin-top: 18px;
            font-size: 32px;
            color: #444;
            font-weight: bold;
        }

        /* 右侧作文区域 */
        .topic-right{
            flex: 1;
        }

        .topic-tip{
            display: flex;
            justify-content: space-between;
            align-items: center;

            font-size: 20px;
            color: #333;

            margin-bottom: 25px;
        }

        .timer{
            font-size: 22px;
            color: #666;
            font-weight: bold;
        }

        .writing-lines{
            margin-top: 10px;
        }

        .line{
            border-bottom: 1px solid #d8a99d;
            height: 46px;
        }

        /* 手机适配 */
        @media screen and (max-width: 900px){

            .topic-layout{
                flex-direction: column;
            }

            .topic-left{
                width: 100%;
            }

            .topic-tip{
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                line-height: 1.8;
            }

            .topic-title{
                font-size: 24px;
            }
        }

    </style>

</head>
<body>

<!-- 顶部导航 -->
<header>

    <div class="logo">中文学习平台</div>

    <nav>
        <a href="index.html">首页</a>
        <a href="youth.html">青少年学习者</a>
    </nav>

</header>

<!-- 页面主体 -->
<div class="topic-container">

    <div class="scroll-wrapper">

        <div class="topic-layout">

            <!-- 左侧图片 -->
            <div class="topic-left">

                <img src="images/topics/1.jpg" alt="保护视力">

                <div class="topic-title">
                    保护视力
                </div>

            </div>

            <!-- 右侧作文 -->
            <div class="topic-right">

                <div class="topic-tip">

                    <div>
                        看左侧这幅图片，用自己的话描述图中的内容，必须说满30秒。
                    </div>

                    <div class="timer">
                        ⏰ 01:00
                    </div>

                </div>

                <div class="writing-lines">

                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- 页脚 -->
<footer>
    © 2026 中文学习平台
</footer>

</body>
</html>
