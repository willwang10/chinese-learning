<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>我最喜欢的运动</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
    background:#f5f2eb;
}

/* 主体 */
.topic-wrapper{
    width:90%;
    max-width:1400px;
    margin:40px auto 60px;
}

/* 卷轴 */
.scroll-board{
    position:relative;
    background:#f8f4ed;
    border:3px solid #d9b8aa;
    padding:30px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

/* 两侧卷轴 */
.scroll-board::before,
.scroll-board::after{
    content:"";
    position:absolute;
    top:-20px;
    width:36px;
    height:calc(100% + 40px);

    background:linear-gradient(
        to right,
        #d8cfc2 0%,
        #f7f2ea 20%,
        #fffaf3 50%,
        #efe5d7 80%,
        #cbbba7 100%
    );

    border-radius:18px;

    box-shadow:
        inset 3px 0 5px rgba(255,255,255,.8),
        inset -3px 0 5px rgba(0,0,0,.12),
        0 2px 8px rgba(0,0,0,.15);
}

.scroll-board::before{
    left:-28px;
}

.scroll-board::after{
    right:-28px;
}

/* 布局 */
.topic-content{
    display:flex;
    gap:40px;
}

.topic-left{
    width:28%;
}

.topic-right{
    flex:1;
}

/* 左侧标题 */
.topic-title{
    font-size:28px;
    font-weight:bold;
    color:#333;
    margin-bottom:25px;
}

/* 左侧内容 */
.topic-desc{
    font-size:18px;
    line-height:2;
    color:#444;
}

.notice{
    margin-top:40px;
    font-size:22px;
    font-weight:bold;
    color:#d98c2e;
}

/* 右侧顶部 */
.topic-header{
    display:flex;
    justify-content:flex-end;
    margin-bottom:30px;
}

.timer{
    font-size:22px;
    font-weight:bold;
    color:#666;
}

/* 横线 */
.writing-area{
    margin-top:10px;
}

.writing-line{
    height:42px;
    border-bottom:1px solid #d9a79b;
}

/* 手机 */
@media(max-width:900px){

    .topic-content{
        flex-direction:column;
    }

    .topic-left{
        width:100%;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">中文学习平台</div>

    <nav>
        <a href="../index.html">首页</a>
        <a href="../youth.html">青少年学习者</a>
    </nav>
</header>

<div class="topic-wrapper">

    <div class="scroll-board">

        <div class="topic-content">

            <!-- 左侧 -->
            <div class="topic-left">

                <div class="topic-title">
                    我最喜欢的运动
                </div>

                <div class="topic-desc">

                        你最喜欢什么运动？
                        为什么喜欢？
                        请介绍运动的过程和感受。
                        
                </div>

                <div class="notice">
                    ⚠ 必须说满30秒
                </div>

            </div>

            <!-- 右侧 -->
            <div class="topic-right">

                <div class="topic-header">

                    <div class="timer">
                        ⏰ 01:00
                    </div>

                </div>

                <div class="writing-area">

                    <div class="writing-line"></div>
                    <div class="writing-line"></div>
                    <div class="writing-line"></div>
                    <div class="writing-line"></div>
                    <div class="writing-line"></div>
                    <div class="writing-line"></div>
                    <div class="writing-line"></div>
                    <div class="writing-line"></div>

                </div>

            </div>

        </div>

    </div>

</div>

<footer>
    © 2026 中文学习平台
</footer>

</body>
</html>
